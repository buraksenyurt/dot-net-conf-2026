<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Araç Ekleme</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; margin-bottom: 24px; color: #1a1a1a; }
        .form-section { margin-bottom: 32px; }
        .form-section h2 { font-size: 18px; margin-bottom: 16px; color: #333; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #555; }
        .form-group label .required { color: #d32f2f; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #2196f3; }
        .form-group-full { grid-column: 1 / -1; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; }
        .checkbox-item { display: flex; align-items: center; gap: 6px; }
        .checkbox-item input[type="checkbox"] { width: 18px; height: 18px; }
        .price-input { display: flex; gap: 10px; align-items: flex-end; }
        .price-input input { flex: 1; }
        .price-input select { width: 120px; }
        .help-text { font-size: 12px; color: #777; margin-top: 4px; }
        .error-text { font-size: 12px; color: #d32f2f; margin-top: 4px; display: none; }
        .button-group { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        button { padding: 10px 24px; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background-color 0.2s; }
        .btn-primary { background: #2196f3; color: white; }
        .btn-primary:hover { background: #1976d2; }
        .btn-secondary { background: #f5f5f5; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Yeni Araç Ekle</h1>
        
        <form id="vehicleForm">
            <!-- Temel Bilgiler -->
            <div class="form-section">
                <h2>Temel Bilgiler</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>VIN Numarası <span class="required">*</span></label>
                        <input type="text" id="vin" name="vin" maxlength="17" placeholder="1HGBH41JXMN109186" required>
                        <span class="help-text">17 karakterli araç kimlik numarası</span>
                        <span class="error-text" id="vin-error">Geçersiz VIN formatı</span>
                    </div>
                    
                    <div class="form-group">
                        <label>Marka <span class="required">*</span></label>
                        <select id="brand" name="brand" required>
                            <option value="">Seçiniz...</option>
                            <option value="honda">Honda</option>
                            <option value="toyota">Toyota</option>
                            <option value="mercedes">Mercedes-Benz</option>
                            <option value="bmw">BMW</option>
                            <option value="audi">Audi</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Model <span class="required">*</span></label>
                        <select id="model" name="model" required>
                            <option value="">Önce marka seçiniz...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Model Yılı <span class="required">*</span></label>
                        <input type="number" id="year" name="year" min="2000" max="2027" value="2026" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Renk <span class="required">*</span></label>
                        <select id="color" name="color" required>
                            <option value="">Seçiniz...</option>
                            <option value="beyaz">Beyaz</option>
                            <option value="siyah">Siyah</option>
                            <option value="gri">Gri</option>
                            <option value="gumus">Gümüş</option>
                            <option value="kirmizi">Kırmızı</option>
                            <option value="mavi">Mavi</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Kilometre <span class="required">*</span></label>
                        <input type="number" id="mileage" name="mileage" min="0" value="0" required>
                        <span class="help-text">Sıfır araçlar için 0 giriniz</span>
                    </div>
                </div>
            </div>
            
            <!-- Teknik Özellikler -->
            <div class="form-section">
                <h2>Teknik Özellikler</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Motor Tipi <span class="required">*</span></label>
                        <select id="engineType" name="engineType" required>
                            <option value="">Seçiniz...</option>
                            <option value="petrol">Benzin</option>
                            <option value="diesel">Dizel</option>
                            <option value="electric">Elektrik</option>
                            <option value="hybrid">Hibrit</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Vites Tipi <span class="required">*</span></label>
                        <select id="transmissionType" name="transmissionType" required>
                            <option value="">Seçiniz...</option>
                            <option value="manual">Manuel</option>
                            <option value="automatic">Otomatik</option>
                            <option value="semi-automatic">Yarı Otomatik</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Motor Hacmi (cc)</label>
                        <input type="number" id="engineCapacity" name="engineCapacity" min="0" placeholder="1500">
                    </div>
                    
                    <div class="form-group">
                        <label>Yakıt Tüketimi (L/100km)</label>
                        <input type="number" id="fuelConsumption" name="fuelConsumption" step="0.1" min="0" placeholder="5.2">
                    </div>
                </div>
            </div>
            
            <!-- Fiyat Bilgileri -->
            <div class="form-section">
                <h2>Fiyat Bilgileri</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Alış Fiyatı <span class="required">*</span></label>
                        <div class="price-input">
                            <input type="number" id="purchasePrice" name="purchasePrice" min="0" step="1000" placeholder="1500000" required>
                            <select id="purchaseCurrency" name="purchaseCurrency">
                                <option value="TRY" selected>TRY</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Tavsiye Satış Fiyatı <span class="required">*</span></label>
                        <div class="price-input">
                            <input type="number" id="suggestedPrice" name="suggestedPrice" min="0" step="1000" placeholder="1725000" required>
                            <select id="suggestedCurrency" name="suggestedCurrency">
                                <option value="TRY" selected>TRY</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                            </select>
                        </div>
                        <span class="help-text">Varsayılan kar marjı: %15</span>
                    </div>
                </div>
            </div>
            
            <!-- Donatım ve Özellikler -->
            <div class="form-section">
                <h2>Donatım ve Özellikler</h2>
                <div class="form-group-full">
                    <label>Opsiyonel Donatımlar</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="sunroof" name="features" value="Sunroof">
                            <label for="sunroof">Sunroof</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="leatherSeats" name="features" value="LeatherSeats">
                            <label for="leatherSeats">Deri Döşeme</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="navigation" name="features" value="NavigationSystem">
                            <label for="navigation">Navigasyon Sistemi</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="parkingSensors" name="features" value="ParkingSensors">
                            <label for="parkingSensors">Park Sensörleri</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="bluetooth" name="features" value="Bluetooth">
                            <label for="bluetooth">Bluetooth</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="cruiseControl" name="features" value="CruiseControl">
                            <label for="cruiseControl">Hız Sabitleyici</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="alloyWheels" name="features" value="AlloyWheels">
                            <label for="alloyWheels">Alüminyum Jant</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="rearCamera" name="features" value="RearCamera">
                            <label for="rearCamera">Geri Görüş Kamerası</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Butonlar -->
            <div class="button-group">
                <button type="button" class="btn-secondary" onclick="window.history.back()">İptal</button>
                <button type="submit" class="btn-primary">Kaydet</button>
            </div>
        </form>
    </div>
    
    <script>
        // Form validation ve submit logic buraya eklenecek
        document.getElementById('vehicleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Form başarıyla kaydedildi! (Demo)');
        });
    </script>
</body>
</html>
