<!-- 
  TYPE: Wireframe
  LAYOUT: MasterLayout (Sidebar + Header)
  PAGE: Vehicle Add Form
  DESC: Yeni araç girişi formu.
-->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Wireframe: Yeni Araç Ekle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background: #f8f9fa; }
        .wireframe-box { border: 2px dashed #ccc; padding: 15px; background: #fff; margin-bottom: 20px; }
        .wireframe-label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div class="mb-4">
        <h1>Yeni Araç Ekle</h1>
        <p>Araç giriş formu.</p>
    </div>

    <div class="wireframe-box">
        <span class="wireframe-label">Form Alanı</span>
        
        <!-- Kimlik Bilgileri -->
        <h5 class="border-bottom pb-2 mb-3">Araç Kimlik</h5>
        <div class="row mb-3">
            <div class="col-12">
                <label>VIN (Şasi No) *</label>
                <input type="text" class="form-control" placeholder="17 hane, zorunlu">
            </div>
        </div>

        <!-- Temel Bilgiler -->
        <h5 class="border-bottom pb-2 mb-3 mt-4">Temel Bilgiler</h5>
        <div class="row g-3">
            <div class="col-md-6">
                <label>Marka *</label>
                <input type="text" class="form-control">
            </div>
            <div class="col-md-6">
                <label>Model *</label>
                <input type="text" class="form-control">
            </div>
            <div class="col-md-6">
                <label>Yıl *</label>
                <input type="number" class="form-control">
            </div>
            <div class="col-md-6">
                <label>Renk *</label>
                <input type="text" class="form-control">
            </div>
        </div>

        <!-- Teknik Detaylar -->
        <h5 class="border-bottom pb-2 mb-3 mt-4">Teknik Özellikler</h5>
        <div class="row g-3">
            <div class="col-md-6">
                <label>Motor Tipi *</label>
                <select class="form-select">
                    <option>Benzin/Dizel/Elektrik/Hibrit</option>
                </select>
            </div>
            <div class="col-md-6">
                <label>Vites Tipi *</label>
                <select class="form-select">
                    <option>Manuel/Otomatik</option>
                </select>
            </div>
            <div class="col-md-4">
                <label>KM *</label>
                <input type="number" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Yakıt Tüketimi (L/100km) *</label>
                <input type="number" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Motor Hacmi (cc) *</label>
                <input type="number" class="form-control">
            </div>
        </div>

        <!-- Fiyatlandırma -->
        <h5 class="border-bottom pb-2 mb-3 mt-4">Fiyatlandırma</h5>
        <div class="row g-3">
            <div class="col-md-6">
                <label>Alış Fiyatı *</label>
                <div class="input-group">
                    <input type="number" class="form-control">
                    <select class="form-select" style="max-width: 80px;"><option>TRY</option></select>
                </div>
            </div>
            <div class="col-md-6">
                <label>Satış Fiyatı *</label>
                <div class="input-group">
                    <input type="number" class="form-control">
                    <select class="form-select" style="max-width: 80px;"><option>TRY</option></select>
                </div>
            </div>
        </div>

        <!-- Aksiyonlar -->
        <div class="mt-4 text-end border-top pt-3">
            <button class="btn btn-secondary me-2">İptal</button>
            <button class="btn btn-primary">Kaydet</button>
        </div>

    </div>

</body>
</html>
