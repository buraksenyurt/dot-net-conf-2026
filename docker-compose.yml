services:

  postgres:
    image: postgres:latest
    container_name: aio-postgres
    environment:
      POSTGRES_USER: johndoe
      POSTGRES_PASSWORD: somew0rds
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgres/data
    networks:
      - aio-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aio-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: scoth@tiger.com
      PGADMIN_DEFAULT_PASSWORD: 123456
    ports:
      - "5052:80"
    depends_on:
      - postgres
    networks:
      - aio-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: aio-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5673:5672"
      - "15673:15672" 
    networks:
      - aio-network

  sonarqube:
    image: sonarqube:latest
    container_name: aio-sonarqube
    hostname: aio-sonarqube
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9001:9000"
    networks:
      - aio-network

volumes:
  postgres_data:

networks:
  aio-network:
    driver: bridge
